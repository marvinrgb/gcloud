events {
    worker_connections 1024;
}

http {
    server {
        # Cloud Run listens on port 8080 by default
        listen 8080; 

        # Forward all requests to DataDragon
        location / {
            proxy_pass https://ddragon.leagueoflegends.com/;
            
            # Preserve headers and handle SNI for HTTPS
            proxy_set_header Host ddragon.leagueoflegends.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_ssl_server_name on; 
            
            # Optional: Add CORS headers if you are calling this from a web browser
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            
            # Handle OPTIONS requests for browsers
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}